name: biolab_labsync
description: "BioLab - LABSYNC Enterprise v7.0 - Multiplataforma (Windows/macOS/Linux/iOS/Android)"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  sqlite3_flutter_libs: ^0.5.0 # Requerido para Linux
  shared_preferences: ^2.2.2
  shared_preferences_linux: ^2.3.0 # Soporte Linux
  uuid: ^4.3.3
  crypto: ^3.0.3
  provider: ^6.1.1
  intl: ^0.20.2
  path_provider: ^2.1.1 # Multiplataforma paths
  path: ^1.8.3
  connectivity_plus: ^5.0.0 # Deteccion de red multiplataforma
  flutter_localizations:
    sdk: flutter
  # Keep this below 0.4.3 because CI Flutter 3.16 ships Dart 3.2.x.
  sqflite_common_ffi_web: ^0.4.2+1
  file_picker: ^8.1.0
  pdf: ^3.10.0
  printing: ^5.12.0
  excel: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  generate: true # Para intl
