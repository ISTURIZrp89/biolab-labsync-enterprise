name: Build LABSYNC Multi-Platform

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows
            artifact_name: labsync-windows
            artifact_path: frontend_flutter/build/windows/x64/runner/Release/
          - os: macos-latest
            target: macos
            artifact_name: labsync-macos
            artifact_path: frontend_flutter/build/macos/Build/Products/Release/
          - os: ubuntu-latest
            target: linux
            artifact_name: labsync-linux
            artifact_path: frontend_flutter/build/linux/x64/release/bundle/
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.27.4'
          cache: true

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          check-latest: true

      - run: flutter pub get
        working-directory: frontend_flutter

      - name: Check token
        env:
          TOKEN: ${{ secrets.LICENSE_GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          BASE_REPO: ${{ github.repository }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            if [ "$PR_HEAD_REPO" != "$BASE_REPO" ]; then
              echo "PR desde fork detectado: GitHub NO expone secretos en pull_request de forks."
            else
              echo "PR interno detectado: secretos disponibles si estan configurados."
            fi
          fi
          if [ -n "$TOKEN" ]; then
            echo "TOKEN CONFIGURADO (${#TOKEN} caracteres)"
          else
            echo "ADVERTENCIA: Token LICENSE_GITHUB_TOKEN vacio. Usando modo demo."
          fi
        shell: bash

      - name: Build ${{ matrix.target }}
        env:
          TOKEN: ${{ secrets.LICENSE_GITHUB_TOKEN }}
          TARGET: ${{ matrix.target }}
        run: |
          if [ -n "$TOKEN" ]; then
            flutter build "$TARGET" --release --dart-define="LICENSE_GITHUB_TOKEN=$TOKEN"
          else
            flutter build "$TARGET" --release
          fi
        shell: bash
        working-directory: frontend_flutter

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
