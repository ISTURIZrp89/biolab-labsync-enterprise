name: Build Native Desktop Apps

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-2022
    defaults:
      run:
        working-directory: frontend_flutter
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: false

      - name: Install dependencies
        run: flutter pub get

      - name: Clean previous build
        run: if (Test-Path build/windows) { Remove-Item -Recurse -Force build/windows }

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build backend EXE with PyInstaller
        run: |
          cd ..\backend
          pip install -r requirements.txt pyinstaller
          pyinstaller --onefile --noconsole --name labsync-backend --distpath dist --hidden-import=passlib.handlers.bcrypt main.py

      - name: Diagnostic token
        env:
          TOKEN: ${{ secrets.LICENSE_GITHUB_TOKEN }}
        run: |
          if ("$env:TOKEN".Length -gt 0) {
            Write-Host "::notice::Token LICENSE_GITHUB_TOKEN presente ($($env:TOKEN.Length) caracteres, primeros 4: $($env:TOKEN.Substring(0,4))...)"
          } else {
            Write-Host "::error::Token LICENSE_GITHUB_TOKEN VACIO - Configuralo en Settings > Secrets and variables > Actions"
          }

      - name: Build Windows
        env:
          TOKEN: ${{ secrets.LICENSE_GITHUB_TOKEN }}
        run: |
          $define = if ("$env:TOKEN".Length -gt 0) { "--dart-define=LICENSE_GITHUB_TOKEN=$env:TOKEN" } else { "" }
          flutter build windows --release $define 2>&1

      - name: Bundle backend + Flutter en un solo directorio portatil
        run: |
          mkdir -p build/installer/BioLab-LABSYNC/backend
          xcopy build\windows\x64\runner\Release\ build\installer\BioLab-LABSYNC\ /E /I /Y
          xcopy ..\backend\dist\labsync-backend.exe build\installer\BioLab-LABSYNC\backend\ /Y

      - name: Create portable ZIP
        run: |
          cd build/installer
          7z a -tzip ../../BioLab-LABSYNC-Windows.zip BioLab-LABSYNC\

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: BioLab-LABSYNC-Windows
          path: frontend_flutter/BioLab-LABSYNC-Windows.zip

  build-linux:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: frontend_flutter
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: false

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev file

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Diagnostic token
        env:
          TOKEN: ${{ secrets.LICENSE_GITHUB_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "::notice::Token LICENSE_GITHUB_TOKEN presente (${#TOKEN} caracteres)"
          else
            echo "::error::Token LICENSE_GITHUB_TOKEN VACIO - Comprueba Settings > Secrets"
          fi

      - name: Build Linux
        env:
          TOKEN: ${{ secrets.LICENSE_GITHUB_TOKEN }}
        run: |
          DEFINE=""
          if [ -n "$TOKEN" ]; then DEFINE="--dart-define=LICENSE_GITHUB_TOKEN=$TOKEN"; fi
          flutter build linux --release $DEFINE

      - name: Create Linux bundle
        run: |
          mkdir -p build/installer/BioLab-LABSYNC
          cp -r build/linux/x64/release/bundle/* build/installer/BioLab-LABSYNC/
          cd build/installer
          tar -czf ../../BioLab-LABSYNC-Linux.tar.gz BioLab-LABSYNC/

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: BioLab-LABSYNC-Linux
          path: frontend_flutter/BioLab-LABSYNC-Linux.tar.gz

  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: frontend_flutter
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: false

      - name: Ensure iOS platform files (required for macOS SPM)
        run: |
          if [ ! -d ios/Runner.xcodeproj ]; then
            mkdir -p ios
            flutter create --platforms=ios --project-name biolab_labsync . 2>/dev/null || true
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Diagnostic token
        env:
          TOKEN: ${{ secrets.LICENSE_GITHUB_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "::notice::Token LICENSE_GITHUB_TOKEN presente (${#TOKEN} caracteres)"
          else
            echo "::error::Token LICENSE_GITHUB_TOKEN VACIO - Comprueba Settings > Secrets"
          fi

      - name: Build macOS
        env:
          TOKEN: ${{ secrets.LICENSE_GITHUB_TOKEN }}
          FLUTTER_ENABLE_SWIFT_PACKAGE_MANAGER: false
        run: |
          DEFINE=""
          if [ -n "$TOKEN" ]; then DEFINE="--dart-define=LICENSE_GITHUB_TOKEN=$TOKEN"; fi
          flutter build macos --release $DEFINE 2>&1

      - name: Create DMG
        run: |
          mkdir -p build/installer
          cp -r build/macos/Build/Products/Release/biolab_labsync.app build/installer/
          hdiutil create -volname "BioLab-LABSYNC" -srcfolder build/installer/biolab_labsync.app -ov -format UDZO build/installer/BioLab-LABSYNC-macOS.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: BioLab-LABSYNC-macOS
          path: frontend_flutter/build/installer/BioLab-LABSYNC-macOS.dmg

  create-release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/BioLab-LABSYNC-Windows/BioLab-LABSYNC-Windows.zip
            artifacts/BioLab-LABSYNC-Linux/BioLab-LABSYNC-Linux.tar.gz
            artifacts/BioLab-LABSYNC-macOS/BioLab-LABSYNC-macOS.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
