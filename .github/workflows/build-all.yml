name: Build All Platforms

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-docker-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t biolab-labsync:latest .

      - name: Test Docker container
        run: |
          docker run -d --name test-web -p 8080:80 biolab-labsync:latest
          sleep 5
          curl -f http://localhost:8080 || exit 1
          docker stop test-web && docker rm test-web

      - name: Save Docker image
        run: docker save biolab-labsync:latest | gzip > biolab-labsync-web.tar.gz

      - name: Upload Docker artifact
        uses: actions/upload-artifact@v4
        with:
          name: BioLab-LABSYNC-Docker
          path: biolab-labsync-web.tar.gz

  build-linux:
    runs-on: ubuntu-latest
    container: ghcr.io/cirruslabs/flutter:3.24.5
    defaults:
      run:
        working-directory: frontend_flutter
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          apt-get update
          apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Build Linux
        run: flutter build linux --release

      - name: Create installer
        run: |
          mkdir -p build/installer/BioLab-LABSYNC
          cp -r build/linux/x64/release/bundle/* build/installer/BioLab-LABSYNC/

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: BioLab-LABSYNC-Linux
          path: frontend_flutter/build/installer/BioLab-LABSYNC/

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: frontend_flutter
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.24.0'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Create installer
        run: |
          mkdir -p build/installer/BioLab-LABSYNC
          xcopy build\windows\x64\runner\Release\ build\installer\BioLab-LABSYNC\ /E /I /Y

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: BioLab-LABSYNC-Windows
          path: frontend_flutter/build/installer/BioLab-LABSYNC/

  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: frontend_flutter
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.24.0'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Create installer
        run: |
          mkdir -p build/installer/BioLab-LABSYNC
          cp -r build/macos/Build/Products/Release/biolab_labsync.app build/installer/BioLab-LABSYNC/

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: BioLab-LABSYNC-macOS
          path: frontend_flutter/build/installer/BioLab-LABSYNC/

  create-release:
    needs: [build-docker-web, build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create release archives
        run: |
          cd artifacts/
          zip -r BioLab-LABSYNC-Windows.zip BioLab-LABSYNC-Windows/
          zip -r BioLab-LABSYNC-Linux.zip BioLab-LABSYNC-Linux/
          zip -r BioLab-LABSYNC-macOS.zip BioLab-LABSYNC-macOS/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/BioLab-LABSYNC-Docker/biolab-labsync-web.tar.gz
            artifacts/BioLab-LABSYNC-Windows.zip
            artifacts/BioLab-LABSYNC-Linux.zip
            artifacts/BioLab-LABSYNC-macOS.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
