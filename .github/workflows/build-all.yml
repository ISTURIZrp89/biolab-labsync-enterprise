name: Build Native Desktop Apps

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: frontend_flutter
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.24.0'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Create installer
        run: |
          mkdir -p build/installer
          xcopy build\windows\x64\runner\Release\ build\installer\BioLab-LABSYNC\ /E /I /Y

      - name: Create ZIP
        run: |
          cd build/installer
          7z a -tzip ../../BioLab-LABSYNC-Windows.zip BioLab-LABSYNC\

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: BioLab-LABSYNC-Windows
          path: frontend_flutter/BioLab-LABSYNC-Windows.zip

  build-linux:
    runs-on: ubuntu-latest
    container: ghcr.io/cirruslabs/flutter:3.24.5
    defaults:
      run:
        working-directory: frontend_flutter
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          apt-get update
          apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev file

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Build Linux
        run: flutter build linux --release

      - name: Download AppImageTool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O /usr/local/bin/appimagetool
          chmod +x /usr/local/bin/appimagetool

      - name: Create AppImage
        run: |
          mkdir -p build/installer/BioLab-LABSYNC.AppDir
          cp -r build/linux/x64/release/bundle/* build/installer/BioLab-LABSYNC.AppDir/
          cp linux/runner/my_application.cc build/installer/BioLab-LABSYNC.AppDir/.DirIcon 2>/dev/null || true
          cat > build/installer/BioLab-LABSYNC.AppDir/BioLab-LABSYNC.desktop << 'EOF'
          [Desktop Entry]
          Name=BioLab LABSYNC
          Exec=biolab_labsync
          Icon=biolab_labsync
          Type=Application
          Categories=Utility;
          EOF
          cat > build/installer/BioLab-LABSYNC.AppDir/AppRun << 'EOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          exec "$HERE/biolab_labsync" "$@"
          EOF
          chmod +x build/installer/BioLab-LABSYNC.AppDir/AppRun
          cd build/installer
          appimagetool BioLab-LABSYNC.AppDir BioLab-LABSYNC-Linux.AppImage

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: BioLab-LABSYNC-Linux
          path: frontend_flutter/build/installer/BioLab-LABSYNC-Linux.AppImage

  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: frontend_flutter
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.24.0'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Create DMG
        run: |
          mkdir -p build/installer
          cp -r build/macos/Build/Products/Release/biolab_labsync.app build/installer/
          hdiutil create -volname "BioLab-LABSYNC" -srcfolder build/installer/biolab_labsync.app -ov -format UDZO build/installer/BioLab-LABSYNC-macOS.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: BioLab-LABSYNC-macOS
          path: frontend_flutter/build/installer/BioLab-LABSYNC-macOS.dmg

  create-release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/BioLab-LABSYNC-Windows/BioLab-LABSYNC-Windows.zip
            artifacts/BioLab-LABSYNC-Linux/BioLab-LABSYNC-Linux.AppImage
            artifacts/BioLab-LABSYNC-macOS/BioLab-LABSYNC-macOS.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
