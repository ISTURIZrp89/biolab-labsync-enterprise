name: Build Native Desktop Apps

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-2022
    defaults:
      run:
        working-directory: frontend_flutter
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.27.4'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Clean previous build
        run: if (Test-Path build/windows) { Remove-Item -Recurse -Force build/windows }

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Build Windows
        env:
          TOKEN: ${{ secrets.LICENSE_GITHUB_TOKEN }}
        run: |
          if ("$env:TOKEN".Length -gt 0) {
            Write-Host "Token OK, compilando..." -ForegroundColor Green
            flutter build windows --release --verbose --dart-define=LICENSE_GITHUB_TOKEN="$env:TOKEN" 2>&1
          } else {
            Write-Host "ERROR: Token LICENSE_GITHUB_TOKEN vacio" -ForegroundColor Red
            exit 1
          }

      - name: Create installer
        run: |
          mkdir -p build/installer
          xcopy build\windows\x64\runner\Release\ build\installer\BioLab-LABSYNC\ /E /I /Y

      - name: Create ZIP
        run: |
          cd build/installer
          7z a -tzip ../../BioLab-LABSYNC-Windows.zip BioLab-LABSYNC\

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: BioLab-LABSYNC-Windows
          path: frontend_flutter/BioLab-LABSYNC-Windows.zip

  build-linux:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: frontend_flutter
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.24.0'
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev file

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Build Linux
        env:
          TOKEN: ${{ secrets.LICENSE_GITHUB_TOKEN }}
        run: flutter build linux --release --dart-define=LICENSE_GITHUB_TOKEN="$TOKEN"

      - name: Create Linux bundle
        run: |
          mkdir -p build/installer/BioLab-LABSYNC
          cp -r build/linux/x64/release/bundle/* build/installer/BioLab-LABSYNC/
          cd build/installer
          tar -czf ../../BioLab-LABSYNC-Linux.tar.gz BioLab-LABSYNC/

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: BioLab-LABSYNC-Linux
          path: frontend_flutter/BioLab-LABSYNC-Linux.tar.gz

  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: frontend_flutter
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.24.0'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS
        env:
          TOKEN: ${{ secrets.LICENSE_GITHUB_TOKEN }}
        run: flutter build macos --release --dart-define=LICENSE_GITHUB_TOKEN="$TOKEN"

      - name: Create DMG
        run: |
          mkdir -p build/installer
          cp -r build/macos/Build/Products/Release/biolab_labsync.app build/installer/
          hdiutil create -volname "BioLab-LABSYNC" -srcfolder build/installer/biolab_labsync.app -ov -format UDZO build/installer/BioLab-LABSYNC-macOS.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: BioLab-LABSYNC-macOS
          path: frontend_flutter/build/installer/BioLab-LABSYNC-macOS.dmg

  create-release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/BioLab-LABSYNC-Windows/BioLab-LABSYNC-Windows.zip
            artifacts/BioLab-LABSYNC-Linux/BioLab-LABSYNC-Linux.tar.gz
            artifacts/BioLab-LABSYNC-macOS/BioLab-LABSYNC-macOS.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
