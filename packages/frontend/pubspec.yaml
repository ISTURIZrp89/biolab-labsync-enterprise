name: biolab_labsync
description: "BioLab LABSYNC Enterprise v0.0.0.1 - Desktop (Windows/macOS/Linux)"
publish_to: 'none'
version: 0.0.0.1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

  # State management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Database
  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.9.0

  # Networking
  http: ^1.2.0

  # Utils
  uuid: ^4.4.0
  crypto: ^3.0.0
  shared_preferences: ^2.3.0
  flutter_secure_storage: ^9.0.0
  json_annotation: ^4.9.0

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.21.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0
  json_serializable: ^6.8.0
  mocktail: ^1.0.0

flutter:
  uses-material-design: true
  generate: true
