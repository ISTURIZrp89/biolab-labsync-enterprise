[project]
name = "biolab-backend"
version = "0.0.0.1"
description = "BioLab LABSYNC Enterprise - Backend API"
requires-python = ">=3.11"
dependencies = [
    "fastapi==0.115.0",
    "uvicorn[standard]==0.48.0",
    "sqlalchemy[asyncio]==2.0.35",
    "aiosqlite==0.20.0",
    "asyncpg==0.30.0",
    "pydantic==2.9.0",
    "pydantic-settings==2.5.0",
    "python-jose[cryptography]==3.3.0",
    "passlib[bcrypt]==1.7.4",
    "bcrypt==4.0.1",
    "python-multipart==0.0.9",
    "python-dotenv==1.0.1",
    "alembic==1.13.0",
    "httpx==0.27.0",
]

[project.optional-dependencies]
dev = [
    "pytest==8.3.0",
    "pytest-asyncio==0.24.0",
    "ruff==0.6.0",
    "coverage==7.6.0",
]

[tool.setuptools.packages.find]
include = ["app*"]
exclude = ["alembic*"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
